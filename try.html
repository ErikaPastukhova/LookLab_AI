<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LOOKLAB AI — Выберите продукт</title>
  <link href="landing.css?v=2" rel="stylesheet" type="text/css">
  <link href="ui/messages.css" rel="stylesheet" type="text/css">
</head>
<body>
  <header class="landing-header landing-header--try">
    <div class="landing-header-inner">
      <a class="landing-back-link" href="index.html" aria-label="Назад">
        <span class="landing-back-icon" aria-hidden="true">←</span>
        <span class="landing-back-text">Назад</span>
      </a>
      <div class="landing-header-brand">LOOKLAB AI</div>
      <div class="landing-header-spacer" aria-hidden="true"></div>
    </div>
  </header>

  <main class="try-screen" aria-label="Выбор продукта">
    <section class="section section-try">
      <h2>Попробовать</h2>
      <p class="section-subtitle">Выберите формат демонстрации — онлайн‑манекен или ИИ‑примерочная.</p>

      <div class="try-grid">
        <a class="try-card" href="demo.html?from=try" aria-label="Открыть онлайн-манекен">
          <div class="try-card-icon" aria-hidden="true">🧍</div>
          <h3 class="try-card-title">Онлайн-манекен</h3>
          <p class="try-card-text">Настройте параметры тела и одежды, чтобы оценить посадку и heatmap.</p>
          <span class="try-card-cta">Открыть →</span>
        </a>

        <a class="try-card" href="VirtualTryOn/virtual-try-on.html?from=try" aria-label="Открыть ИИ-примерочную">
          <div class="try-card-icon" aria-hidden="true">📷</div>
          <h3 class="try-card-title">ИИ-примерочная</h3>
          <p class="try-card-text">Загрузите фото и получите визуальную примерку выбранной вещи.</p>
          <span class="try-card-cta">Открыть →</span>
        </a>
      </div>
    </section>
  </main>

  <script type="module">
    import { installGlobalErrorHandlers } from './ui/messages.js';
    installGlobalErrorHandlers();
  </script>
</body>
</html>
